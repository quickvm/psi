name: PR Tests
on:
  pull_request:
    branches: [master]

env:
  DOCKER_RUN: >-
    docker run --rm
    -v "$PWD:/src:ro"
    -w /src
    -e RUFF_CACHE_DIR=/tmp/ruff-cache
    -e XDG_CACHE_HOME=/tmp/cache
    --entrypoint bash
    psi:test -c

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test container
        run: docker build -t psi:test --target test -f Containerfile .

      - name: Lint & Format
        run: ${{ env.DOCKER_RUN }} "ruff check psi/ tests/ && ruff format --check psi/ tests/"

      - name: Type Check
        run: ${{ env.DOCKER_RUN }} "ty check"

      - name: Unit Tests
        run: ${{ env.DOCKER_RUN }} "pytest -q"

      - name: Build production container
        run: docker build -t psi:prod -f Containerfile .

      - name: Verify production entrypoint
        run: docker run --rm psi:prod --help
