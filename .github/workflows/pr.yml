name: PR Tests
on:
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test container
        run: docker build -t psi:test --target test -f Containerfile .

      - name: Lint & Format
        run: |
          docker run --rm -v "$PWD:/src:ro" -w /src \
            --entrypoint bash psi:test -c \
            "ruff check psi/ tests/ && ruff format --check psi/ tests/"

      - name: Type Check
        run: |
          docker run --rm -v "$PWD:/src:ro" -w /src \
            -e XDG_CACHE_HOME=/tmp/cache \
            --entrypoint bash psi:test -c "ty check"

      - name: Unit Tests
        run: |
          docker run --rm -v "$PWD:/src:ro" -w /src \
            --entrypoint bash psi:test -c "pytest -q"

      - name: Build production container
        run: docker build -t psi:prod -f Containerfile .

      - name: Verify production entrypoint
        run: docker run --rm psi:prod --help
