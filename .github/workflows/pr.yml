name: PR Tests
on:
  pull_request:
    branches: [master]

env:
  DOCKER_RUN: >-
    docker run --rm
    -v "$PWD:/src:ro"
    -w /src
    -e RUFF_CACHE_DIR=/tmp/ruff-cache
    -e XDG_CACHE_HOME=/tmp/cache
    --entrypoint bash
    psi:test -c

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          target: test
          tags: psi:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Lint & Format
        run: ${{ env.DOCKER_RUN }} "ruff check psi/ tests/ && ruff format --check psi/ tests/"

      - name: Type Check
        run: ${{ env.DOCKER_RUN }} "ty check"

      - name: Unit Tests
        run: ${{ env.DOCKER_RUN }} "pytest -q"

      - name: Build production container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          tags: psi:prod
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify production entrypoint
        run: docker run --rm psi:prod --help
